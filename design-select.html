<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Design</title>
    <style>
        :root {
            color: #111;
            box-sizing: border-box;
            font-family: Inter, system-ui, sans-serif;
        }
        *, *::before, *::after { box-sizing: inherit; }
        html, body {
            min-height: 100vh;
            margin: 0;
            background: #000000;
        }
        body {
            display: grid;
            place-items: center;
            padding: 2rem;
        }
        .wrapper {
            width: min(100%, 980px);
            text-align: center;
        }
        h1 {
            margin: 0 0 2rem;
            font-size: clamp(2rem, 4vw, 2.6rem);
            color: #f5f9ff;
            letter-spacing: -0.03em;
            text-shadow: none;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 2rem;
            align-items: start;
        }
        .card {
            min-height: 240px;
            padding: 0;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.16);
            box-shadow: 0 24px 60px rgba(1, 18, 60, 0.28);
            display: grid;
            text-decoration: none;
            color: inherit;
            transition: transform 200ms ease, box-shadow 200ms ease;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(14px);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 32px 80px rgba(1, 18, 60, 0.32);
        }
        .card h2 {
            margin: 0 0 0.75rem;
            font-size: 1.35rem;
        }
        .card p {
            margin: 0;
            color: #333;
            font-size: 1rem;
            line-height: 1.75;
        }
        .card.original {
            position: relative;
            padding: 1.3rem 1.4rem;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #f8fafc;
            display: grid;
            gap: 0.85rem;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }
        .card.original::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 28px;
            background: radial-gradient(circle at top left, rgba(14, 165, 233, 0.26), transparent 32%),
                        radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.18), transparent 24%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 180ms ease, transform 180ms ease;
            transform: scale(0.95);
            z-index: -1;
        }
        .card.original:hover {
            transform: translateY(-2px);
            background: rgba(15, 15, 15, 0.96);
            border-color: rgba(14, 165, 233, 0.9);
        }
        .card.original:hover::before {
            opacity: 1;
            transform: scale(1);
        }
        .card.original h2 {
            margin: 0;
            color: #ffffff;
            font-size: 1.1rem;
        }
        .card.original p {
            margin: 0;
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .card.original .timestamp {
            color: #6b7280;
            font-size: 0.85rem;
            margin: 0;
        }
        .card.original .repo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .card.original .repo-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 700;
        }
        .card.original .repo-arrow {
            color: #94a3b8;
            font-size: 1rem;
        }
        .card.original .language-pill {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.85);
            color: #ffffff;
            font-size: 0.75rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background: rgba(255,255,255,0.05);
            width: fit-content;
        }
        .card.aero {
            position: relative;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 30px 90px rgba(2, 18, 58, 0.36);
            overflow: hidden;
        }
        .card.aero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 10%, rgba(255,255,255,0.18), transparent 20%),
                        radial-gradient(circle at 75% 20%, rgba(255,255,255,0.12), transparent 18%);
            pointer-events: none;
        }
        .aero-window {
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }
        .titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            gap: 1rem;
            background: linear-gradient(180deg, #1a5baa 0%, #2e8ae6 100%);
            border-bottom: 1px solid rgba(255,255,255,0.4);
            position: relative;
        }
        .titlebar::after {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.05));
            pointer-events: none;
        }
        .titlebar h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            letter-spacing: 0.01em;
            text-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }
        .window-controls {
            display: flex;
            gap: 0.5rem;
        }
        .window-button {
            width: 36px;
            height: 22px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.72);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), inset 0 -1px 0 rgba(0,0,0,0.12);
            color: white;
            font-size: 0.95rem;
            line-height: 1;
        }
        .window-button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0.05));
            pointer-events: none;
        }
        .window-button.minimize {
            background: linear-gradient(180deg, #79b6ff 0%, #3574d7 100%);
        }
        .window-button.maximize {
            background: linear-gradient(180deg, #7bb8ff 0%, #3d72cd 100%);
        }
        .window-button.close {
            background: linear-gradient(180deg, #ff7075 0%, #dd3f4a 100%);
        }
        .window-button span {
            position: relative;
            z-index: 1;
        }
        .window-panel {
            padding: 1.75rem 1.5rem 1.5rem;
            color: #eef5ff;
            text-shadow: 0 1px 2px rgba(11, 27, 56, 0.45);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .window-panel p {
            margin: 0;
            color: rgba(255,255,255,0.92);
            font-size: 0.98rem;
            line-height: 1.8;
        }
        .aero-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.9rem;
            margin-top: 0.75rem;
        }
        .action-button {
            min-width: 132px;
            padding: 0.95rem 1.1rem;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.9);
            background: linear-gradient(180deg, #a2c5ff 0%, #3b7ddc 55%, #1d4db4 100%);
            color: white;
            font-weight: 600;
            letter-spacing: 0.01em;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 12px 28px rgba(25, 72, 158, 0.18);
            cursor: default;
            transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .action-button::before {
            content: '';
            position: absolute;
            inset: 1px 1px auto 1px;
            height: 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.18);
            pointer-events: none;
        }
        .action-button:hover {
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 18px 40px rgba(20, 74, 167, 0.24);
        }
        @media (max-width: 840px) {
            .cards { grid-template-columns: 1fr; }
            .card.original {
                border-color: rgba(14, 165, 233, 0.95);
                box-shadow: none;
            }
        }
        @media (max-width: 640px) {
            .titlebar { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
            .window-controls { align-self: stretch; justify-content: flex-end; }
            .aero-actions { flex-direction: column; }
            .action-button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Choose your design to view</h1>
        <div class="cards">
            <a class="card original" href="original/index.html">
                <div class="repo-header">
                    <h2 class="repo-title">Original design</h2>
                    <span class="repo-arrow">→</span>
                </div>
                <p>A dark minimal repository card UI with compact spacing and a crisp, flat surface.</p>
                <span class="language-pill">Open</span>
            </a>
            <a class="card aero" href="aero/index.html">
                <div class="aero-window">
                    <div class="titlebar">
                        <h2>Aero theme</h2>
                        <div class="window-controls">
                            <span class="window-button minimize" aria-label="Minimize"><span>−</span></span>
                            <span class="window-button maximize" aria-label="Maximize"><span>□</span></span>
                            <span class="window-button close" aria-label="Close"><span>✕</span></span>
                        </div>
                    </div>
                    <div class="window-panel">
                        <p>Windows 7 Aero style themed portfolio.</p>
                        <div class="aero-actions">
                            <span class="action-button">Open</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
